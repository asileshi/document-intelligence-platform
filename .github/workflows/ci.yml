name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-compose:
    name: Validate docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate compose config
        run: docker compose -f docker-compose.yml config

      - name: Install API tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt -r services/api/requirements-dev.txt

      - name: Lint API (ruff)
        run: ruff check services/api

      - name: Format check API (black)
        run: black --check services/api

      - name: Test API (pytest)
        run: pytest -q
        working-directory: services/api

      - name: Format check Go (gofmt)
        working-directory: services/ingestion-worker
        run: |
          test -z "$(gofmt -l .)"

      - name: Test Go (go test)
        working-directory: services/ingestion-worker
        run: go test ./...

      - name: Vet Go (go vet)
        working-directory: services/ingestion-worker
        run: go vet ./...

      # Basic smoke check that dependencies can start.
      - name: Start dependencies
        run: docker compose -f docker-compose.yml up -d --build --wait

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/healthz >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant... ($i/30)"
            sleep 2
          done

          echo "Qdrant did not become ready in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs qdrant
          exit 1

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

          echo "API did not become ready in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs api
          exit 1

      - name: Wait for ingestion worker
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:9001/health >/dev/null; then
              echo "Ingestion worker is ready"
              exit 0
            fi
            echo "Waiting for ingestion worker... ($i/30)"
            sleep 2
          done

          echo "Ingestion worker did not become ready in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs ingestion-worker
          exit 1

      - name: Enqueue job and wait for ACK
        id: enqueue_job
        run: |
          resp=$(curl -fsS -X POST http://localhost:8000/ingestion/jobs \
            -H 'Content-Type: application/json' \
            -d '{"text":"hello from ci","source":"ci"}')

          job_id=$(python -c 'import json,sys; print(json.loads(sys.argv[1])["job_id"])' "$resp")
          echo "Enqueued job_id=$job_id"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"

          for i in {1..30}; do
            if docker compose -f docker-compose.yml exec -T redis redis-cli LPOS ingestion:processed "$job_id" | grep -Eq '^[0-9]+$'; then
              echo "ACK received for job_id=$job_id"
              exit 0
            fi
            echo "Waiting for ACK... ($i/30)"
            sleep 2
          done

          echo "ACK not received in time for job_id=$job_id"
          docker compose -f docker-compose.yml exec -T redis redis-cli LRANGE ingestion:processed 0 50
          docker compose -f docker-compose.yml logs ingestion-worker
          exit 1

      - name: Wait for job status to be processed
        run: |
          job_id='${{ steps.enqueue_job.outputs.job_id }}'
          echo "Checking status for job_id=$job_id"

          for i in {1..30}; do
            status_resp=$(curl -fsS "http://localhost:8000/ingestion/jobs/$job_id" || true)
            status=$(python -c 'import json,sys; print(json.loads(sys.argv[1]).get("status", ""))' "$status_resp" 2>/dev/null || true)
            if [ "$status" = "processed" ]; then
              echo "Status is processed for job_id=$job_id"
              exit 0
            fi
            echo "Waiting for status=processed... ($i/30)";
            sleep 2
          done

          echo "Status did not become processed in time for job_id=$job_id"
          curl -fsS "http://localhost:8000/ingestion/jobs/$job_id" || true
          docker compose -f docker-compose.yml logs ingestion-worker
          exit 1

      - name: Verify chunks exist in Qdrant
        run: |
          job_id='${{ steps.enqueue_job.outputs.job_id }}'
          echo "Checking Qdrant points for job_id=$job_id"

          resp=$(curl -fsS -X POST "http://localhost:6333/collections/documents/points/scroll" \
            -H 'Content-Type: application/json' \
            -d "{\"limit\": 10, \"with_payload\": true, \"filter\": {\"must\": [{\"key\": \"job_id\", \"match\": {\"value\": \"$job_id\"}}]}}")

          count=$(python -c 'import json,sys; data=json.loads(sys.argv[1]); print(len(data.get("result", {}).get("points", [])))' "$resp")
          if [ "$count" -lt 1 ]; then
            echo "Expected at least 1 point for job_id=$job_id, got $count"
            echo "$resp"
            docker compose -f docker-compose.yml logs ingestion-worker
            exit 1
          fi
          echo "Found $count point(s) for job_id=$job_id"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v || true
