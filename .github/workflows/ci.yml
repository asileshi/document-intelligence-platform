name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-compose:
    name: Validate docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate compose config
        run: docker compose -f docker-compose.yml config

      - name: Install API tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt -r services/api/requirements-dev.txt

      - name: Lint API (ruff)
        run: ruff check services/api

      - name: Format check API (black)
        run: black --check services/api

      - name: Test API (pytest)
        run: pytest -q
        working-directory: services/api

      - name: Format check Go (gofmt)
        working-directory: services/ingestion-worker
        run: |
          test -z "$(gofmt -l .)"

      - name: Test Go (go test)
        working-directory: services/ingestion-worker
        run: go test ./...

      - name: Vet Go (go vet)
        working-directory: services/ingestion-worker
        run: go vet ./...

      # Basic smoke check that dependencies can start.
      - name: Start dependencies
        run: docker compose -f docker-compose.yml up -d --build --wait

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:6333/healthz >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant... ($i/30)"
            sleep 2
          done

          echo "Qdrant did not become ready in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs qdrant
          exit 1

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

          echo "API did not become ready in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs api
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v || true
