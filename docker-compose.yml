services:
  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    environment:
      API_ENV: dev
    restart: unless-stopped

  ingestion-worker:
    build:
      context: ./services/ingestion-worker
    ports:
      - "9001:9001"
    environment:
      WORKER_ENV: dev
      PORT: 9001
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dip_password}
      POSTGRES_DB: ${POSTGRES_DB:-dip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dip} -d ${POSTGRES_DB:-dip}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
